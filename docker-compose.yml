# ═══════════════════════════════════════════════════════════════════
# CES Service — Backend infrastructure (PostgreSQL 16 · Redis 7)
# The Spring Boot app runs from the IDE (or `mvnw spring-boot:run`) and
# connects to these on localhost. Values are read from .env in this folder.
#
#   cp .env.example .env        # first time (or use the generated .env)
#   docker compose up -d        # start postgres + redis
#   docker compose logs -f      # watch
#   docker compose down         # stop (add -v to also wipe data)
#
# Project name defaults to the folder ("backend"); matches the IDE's -p backend.
# ═══════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ces_backend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ces_net]

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ces_backend_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ces_net]

volumes:
  postgres_data:
  redis_data:

networks:
  ces_net:
    driver: bridge
